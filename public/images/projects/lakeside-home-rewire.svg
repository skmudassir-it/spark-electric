<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="480" cy="80" r="40" fill="#F59E0B" fill-opacity="0.3"/>
  <circle cx="480" cy="80" r="30" fill="#F59E0B" fill-opacity="0.5"/>
  <!-- Water/lake -->
  <ellipse cx="250" cy="360" rx="350" ry="60" fill="url(#water)"/>
  <!-- House -->
  <polygon points="250,120 150,220 350,220" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
  <rect x="180" y="220" width="140" height="110" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
  <rect x="210" y="275" width="35" height="55" fill="white" fill-opacity="0.2" rx="2"/>
  <rect x="200" y="245" width="22" height="18" fill="white" fill-opacity="0.2" rx="2"/>
  <rect x="278" y="245" width="22" height="18" fill="white" fill-opacity="0.2" rx="2"/>
  <!-- Trees -->
  <circle cx="120" cy="200" r="40" fill="white" fill-opacity="0.1"/>
  <circle cx="430" cy="180" r="50" fill="white" fill-opacity="0.1"/>
  <rect x="117" y="235" width="6" height="25" fill="white" fill-opacity="0.15"/>
  <rect x="427" y="225" width="6" height="25" fill="white" fill-opacity="0.15"/>
  <!-- Power line -->
  <line x1="150" y1="150" x2="450" y2="150" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
</svg>
