<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Factory building -->
  <rect x="80" y="100" width="440" height="220" fill="white" fill-opacity="0.08" stroke="white" stroke-width="2" stroke-opacity="0.3" rx="3"/>
  <!-- Sawtooth roof -->
  <polygon points="80,100 140,50 200,100" fill="white" fill-opacity="0.05" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="200,100 260,50 320,100" fill="white" fill-opacity="0.05" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="320,100 380,50 440,100" fill="white" fill-opacity="0.05" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="440,100 500,55 520,100" fill="white" fill-opacity="0.05" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Roll-up door -->
  <rect x="220" y="160" width="160" height="160" fill="white" fill-opacity="0.06" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="220" y1="200" x2="380" y2="200" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="220" y1="240" x2="380" y2="240" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="220" y1="280" x2="380" y2="280" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Windows -->
  <rect x="100" y="130" width="40" height="30" fill="#F59E0B" fill-opacity="0.15" stroke="white" stroke-width="1" stroke-opacity="0.3" rx="2"/>
  <rect x="460" y="130" width="40" height="30" fill="#F59E0B" fill-opacity="0.15" stroke="white" stroke-width="1" stroke-opacity="0.3" rx="2"/>
  <!-- Power lines -->
  <line x1="300" y1="100" x2="300" y2="40" stroke="white" stroke-width="2.5" stroke-opacity="0.3"/>
  <line x1="250" y1="40" x2="350" y2="40" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>
  <!-- Transformer -->
  <rect x="270" y="25" width="60" height="20" fill="#F59E0B" fill-opacity="0.2" stroke="#F59E0B" stroke-width="1.5" rx="2"/>
  <!-- Ground -->
  <rect x="0" y="320" width="600" height="80" fill="white" fill-opacity="0.03"/>
</svg>
