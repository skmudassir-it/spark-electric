<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- House -->
  <polygon points="300,60 180,150 420,150" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
  <rect x="210" y="150" width="180" height="140" fill="white" fill-opacity="0.1" stroke="white" stroke-width="2"/>
  <rect x="260" y="220" width="80" height="70" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5" rx="2"/>
  <rect x="230" y="170" width="30" height="30" fill="white" fill-opacity="0.15" rx="2"/>
  <rect x="340" y="170" width="30" height="30" fill="white" fill-opacity="0.15" rx="2"/>
  <!-- Smart icons floating -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="22" fill="white" fill-opacity="0.12" stroke="white" stroke-width="1.5"/>
    <path d="M-10,5 Q-5,-10 0,-15 Q5,-10 10,5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="3" fill="white"/>
  </g>
  <g transform="translate(500, 120)">
    <circle cx="0" cy="0" r="22" fill="#F59E0B" fill-opacity="0.2" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="-8" y1="-8" x2="-8" y2="8" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="8" y1="-8" x2="8" y2="8" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  <g transform="translate(140, 280)">
    <rect x="-20" y="-20" width="40" height="40" fill="white" fill-opacity="0.1" stroke="white" stroke-width="1.5" rx="3"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-family="sans-serif" fill="white" font-weight="bold">72°</text>
  </g>
  <g transform="translate(460, 280)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="white" fill-opacity="0.2"/>
  </g>
  <!-- Connection dots -->
  <circle cx="130" cy="140" r="3" fill="#F59E0B" fill-opacity="0.5"/>
  <circle cx="470" cy="160" r="3" fill="#F59E0B" fill-opacity="0.5"/>
</svg>
