<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Skyline buildings -->
  <rect x="80" y="180" width="100" height="170" fill="url(#bldg)" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="200" y="100" width="130" height="250" fill="url(#bldg)" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="350" y="140" width="110" height="210" fill="url(#bldg)" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="480" y="200" width="90" height="150" fill="url(#bldg)" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Building 1 windows -->
  <rect x="100" y="200" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="120" y="200" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="140" y="200" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="100" y="230" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="120" y="230" width="10" height="10" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
  <rect x="140" y="230" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="100" y="260" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="120" y="260" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="140" y="260" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <!-- Building 2 windows -->
  <rect x="220" y="120" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="250" y="120" width="10" height="10" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
  <rect x="280" y="120" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="220" y="150" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="250" y="150" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="280" y="150" width="10" height="10" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
  <rect x="220" y="180" width="10" height="10" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
  <rect x="250" y="180" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="280" y="180" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="220" y="210" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="250" y="210" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="280" y="210" width="10" height="10" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
  <!-- Building 3 windows -->
  <rect x="370" y="160" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="400" y="160" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <rect x="370" y="190" width="10" height="10" fill="#F59E0B" fill-opacity="0.5" rx="1"/>
  <rect x="400" y="190" width="10" height="10" fill="white" fill-opacity="0.3" rx="1"/>
  <!-- Ground -->
  <rect x="0" y="350" width="600" height="50" fill="white" fill-opacity="0.05"/>
</svg>
