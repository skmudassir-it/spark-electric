<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Warehouse structure -->
  <rect x="50" y="80" width="500" height="260" fill="#F8FAFC" stroke="#1E40AF" stroke-width="2" stroke-opacity="0.25" rx="3"/>
  <!-- Roof -->
  <polygon points="30,80 300,20 570,80" fill="#1E40AF" fill-opacity="0.08" stroke="#1E40AF" stroke-width="1.5" stroke-opacity="0.2"/>
  <!-- Racks/shelving -->
  <rect x="80" y="140" width="100" height="180" fill="none" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="80" y1="170" x2="180" y2="170" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="80" y1="200" x2="180" y2="200" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="80" y1="230" x2="180" y2="230" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="80" y1="260" x2="180" y2="260" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="80" y1="290" x2="180" y2="290" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Rack boxes -->
  <rect x="100" y="145" width="30" height="20" fill="#1E40AF" fill-opacity="0.1" rx="2"/>
  <rect x="140" y="145" width="30" height="20" fill="#1E40AF" fill-opacity="0.15" rx="2"/>
  <rect x="100" y="175" width="30" height="20" fill="#1E40AF" fill-opacity="0.1" rx="2"/>
  <rect x="140" y="175" width="30" height="20" fill="#1E40AF" fill-opacity="0.15" rx="2"/>
  <!-- LED fixtures -->
  <rect x="200" y="90" width="80" height="12" fill="#F59E0B" fill-opacity="0.3" rx="3"/>
  <rect x="320" y="90" width="80" height="12" fill="#F59E0B" fill-opacity="0.3" rx="3"/>
  <rect x="200" y="120" width="80" height="12" fill="#F59E0B" fill-opacity="0.15" rx="3"/>
  <rect x="320" y="120" width="80" height="12" fill="#F59E0B" fill-opacity="0.15" rx="3"/>
  <!-- Light glow -->
  <circle cx="240" cy="96" r="40" fill="#F59E0B" fill-opacity="0.08"/>
  <circle cx="360" cy="96" r="40" fill="#F59E0B" fill-opacity="0.08"/>
  <!-- Forklift silhouette -->
  <rect x="400" y="260" width="60" height="30" fill="#1E40AF" fill-opacity="0.15" rx="3"/>
  <rect x="415" y="240" width="8" height="25" fill="#1E40AF" fill-opacity="0.2"/>
  <circle cx="410" cy="295" r="8" fill="none" stroke="#1E40AF" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="450" cy="295" r="8" fill="none" stroke="#1E40AF" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Floor -->
  <rect x="50" y="340" width="500" height="60" fill="#1E40AF" fill-opacity="0.05"/>
</svg>
