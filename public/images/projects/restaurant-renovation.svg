<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Ceiling -->
  <rect x="50" y="40" width="500" height="20" fill="white" fill-opacity="0.08"/>
  <!-- Walls -->
  <rect x="50" y="60" width="500" height="280" fill="white" fill-opacity="0.05"/>
  <!-- Floor -->
  <rect x="50" y="340" width="500" height="60" fill="white" fill-opacity="0.03"/>
  <!-- Tables -->
  <circle cx="180" cy="240" r="35" fill="white" fill-opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="420" cy="240" r="35" fill="white" fill-opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Chairs -->
  <rect x="140" y="200" width="16" height="16" fill="white" fill-opacity="0.1" rx="3"/>
  <rect x="204" y="200" width="16" height="16" fill="white" fill-opacity="0.1" rx="3"/>
  <rect x="170" y="280" width="16" height="16" fill="white" fill-opacity="0.1" rx="3"/>
  <rect x="380" y="200" width="16" height="16" fill="white" fill-opacity="0.1" rx="3"/>
  <rect x="444" y="200" width="16" height="16" fill="white" fill-opacity="0.1" rx="3"/>
  <rect x="410" y="280" width="16" height="16" fill="white" fill-opacity="0.1" rx="3"/>
  <!-- Pendant lights -->
  <line x1="300" y1="60" x2="300" y2="90" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="300" cy="98" rx="18" ry="8" fill="#F59E0B" fill-opacity="0.4"/>
  <circle cx="300" cy="98" r="35" fill="#F59E0B" fill-opacity="0.08"/>
  <!-- Bar/counter area -->
  <rect x="250" y="140" width="100" height="8" fill="white" fill-opacity="0.15" rx="2"/>
  <!-- Kitchen pass-through glow -->
  <rect x="350" y="60" width="80" height="60" fill="#F59E0B" fill-opacity="0.1" rx="4"/>
</svg>
