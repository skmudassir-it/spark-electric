<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Shopping center building -->
  <rect x="50" y="120" width="500" height="200" fill="#F8FAFC" stroke="#1E40AF" stroke-width="2" stroke-opacity="0.3" rx="4"/>
  <!-- Roof -->
  <rect x="40" y="110" width="520" height="15" fill="#1E40AF" fill-opacity="0.2" rx="3"/>
  <!-- Storefronts -->
  <rect x="70" y="140" width="140" height="160" fill="none" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.2" rx="2"/>
  <rect x="230" y="140" width="140" height="160" fill="none" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.2" rx="2"/>
  <rect x="390" y="140" width="140" height="160" fill="none" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.2" rx="2"/>
  <!-- Signs -->
  <rect x="85" y="160" width="110" height="30" fill="#1E40AF" fill-opacity="0.15" rx="3"/>
  <rect x="245" y="160" width="110" height="30" fill="#1E40AF" fill-opacity="0.15" rx="3"/>
  <rect x="405" y="160" width="110" height="30" fill="#F59E0B" fill-opacity="0.2" rx="3"/>
  <!-- Power lines -->
  <line x1="200" y1="110" x2="200" y2="60" stroke="#1E40AF" stroke-width="2.5"/>
  <line x1="400" y1="110" x2="400" y2="60" stroke="#1E40AF" stroke-width="2.5"/>
  <line x1="120" y1="60" x2="480" y2="60" stroke="#1E40AF" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Lightning bolt on power line -->
  <polygon points="300,60 292,80 298,80 290,100 308,75 302,75 310,60" fill="#F59E0B" fill-opacity="0.6"/>
  <!-- Parking lines -->
  <line x1="70" y1="340" x2="530" y2="340" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="140" y1="340" x2="140" y2="370" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="300" y1="340" x2="300" y2="370" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="460" y1="340" x2="460" y2="370" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
</svg>
