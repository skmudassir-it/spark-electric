<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="50%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#1E40AF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Circuit lines - horizontal -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="url(#lineGlow)" stroke-width="1.5"/>
  <line x1="350" y1="120" x2="350" y2="250" stroke="#1E40AF" stroke-opacity="0.1" stroke-width="1.5"/>
  <circle cx="350" cy="250" r="4" fill="#1E40AF" fill-opacity="0.2"/>

  <line x1="200" y1="350" x2="600" y2="350" stroke="url(#lineGlow)" stroke-width="1"/>
  <line x1="400" y1="350" x2="400" y2="180" stroke="#1E40AF" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="200" y1="350" x2="200" y2="480" stroke="#1E40AF" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Circuit line group -->
  <line x1="800" y1="200" x2="1100" y2="200" stroke="#1E40AF" stroke-opacity="0.1" stroke-width="1.5"/>
  <line x1="900" y1="200" x2="900" y2="400" stroke="#1E40AF" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="1000" y1="200" x2="1000" y2="300" stroke="#1E40AF" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="800" cy="200" r="5" fill="#F59E0B" fill-opacity="0.25"/>
  <circle cx="1100" cy="200" r="5" fill="#F59E0B" fill-opacity="0.25"/>
  <circle cx="900" cy="400" r="4" fill="#1E40AF" fill-opacity="0.15"/>

  <!-- More circuit traces -->
  <line x1="50" y1="550" x2="450" y2="550" stroke="#1E40AF" stroke-opacity="0.07" stroke-width="1.5"/>
  <line x1="250" y1="550" x2="250" y2="650" stroke="#1E40AF" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="250" y1="650" x2="550" y2="650" stroke="#1E40AF" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Diagonal traces -->
  <line x1="700" y1="500" x2="900" y2="650" stroke="#F59E0B" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="100" y1="700" x2="350" y2="700" stroke="#1E40AF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Subtle dots/nodes -->
  <circle cx="200" cy="480" r="3" fill="#F59E0B" fill-opacity="0.2"/>
  <circle cx="550" cy="650" r="3" fill="#1E40AF" fill-opacity="0.15"/>
  <circle cx="1000" cy="300" r="3" fill="#1E40AF" fill-opacity="0.12"/>

  <!-- Soft gradient overlays -->
  <ellipse cx="300" cy="100" rx="400" ry="200" fill="#1E40AF" fill-opacity="0.03"/>
  <ellipse cx="900" cy="700" rx="350" ry="250" fill="#F59E0B" fill-opacity="0.04"/>
</svg>
