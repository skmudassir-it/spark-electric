      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Building -->
  <rect x="100" y="60" width="200" height="200" fill="none" stroke="#1E40AF" stroke-width="2.5"/>
