  <rect x="115" y="80" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="160" y="80" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="215" y="80" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="260" y="80" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="115" y="120" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="160" y="120" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="215" y="120" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="260" y="120" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="115" y="160" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="160" y="160" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="215" y="160" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <rect x="260" y="160" width="25" height="25" fill="#1E40AF" fill-opacity="0.3" rx="2"/>
  <!-- Power lines from top -->
  <line x1="200" y1="60" x2="200" y2="15" stroke="#F59E0B" stroke-width="3"/>
