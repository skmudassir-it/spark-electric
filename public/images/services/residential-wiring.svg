<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- House -->
  <polygon points="200,60 80,170 320,170" fill="none" stroke="#1E40AF" stroke-width="3"/>
  <rect x="140" y="170" width="120" height="100" fill="none" stroke="#1E40AF" stroke-width="2.5"/>
  <rect x="180" y="210" width="40" height="60" fill="none" stroke="#1E40AF" stroke-width="2"/>
  <rect x="155" y="190" width="25" height="20" fill="none" stroke="#1E40AF" stroke-width="1.5"/>
  <rect x="220" y="190" width="25" height="20" fill="none" stroke="#1E40AF" stroke-width="1.5"/>
  <!-- Circuit lines from house -->
  <path d="M320,220 L370,220 L370,170" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="370" cy="170" r="4" fill="#F59E0B"/>
  <path d="M80,220 L30,220 L30,140" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="30" cy="140" r="4" fill="#F59E0B"/>
  <!-- Light bolt -->
  <polygon points="200,110 188,150 196,150 185,190 215,140 207,140 218,110" fill="#F59E0B" stroke="none"/>
