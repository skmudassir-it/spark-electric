<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Panel box -->
  <rect x="120" y="50" width="160" height="210" fill="#1E40AF" fill-opacity="0.08" stroke="#1E40AF" stroke-width="2.5" rx="4"/>
  <!-- Panel door lines -->
  <line x1="120" y1="50" x2="280" y2="50" stroke="#1E40AF" stroke-width="2"/>
  <!-- Circuit breakers -->
  <rect x="140" y="75" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="210" y="75" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="140" y="100" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="210" y="100" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="140" y="125" width="50" height="18" fill="#F59E0B" fill-opacity="0.3" rx="2"/>
  <rect x="210" y="125" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="140" y="150" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="210" y="150" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="140" y="175" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <rect x="210" y="175" width="50" height="18" fill="#1E40AF" fill-opacity="0.2" rx="2"/>
  <!-- Main breaker -->
  <rect x="155" y="205" width="90" height="28" fill="#F59E0B" fill-opacity="0.3" stroke="#F59E0B" stroke-width="1.5" rx="3"/>
  <text x="200" y="224" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#92400E" font-weight="bold">MAIN</text>
  <!-- Gauges -->
  <circle cx="100" cy="150" r="28" fill="none" stroke="#1E40AF" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="100" y1="150" x2="115" y2="130" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="100" cy="150" r="3" fill="#1E40AF"/>
  <circle cx="300" cy="150" r="28" fill="none" stroke="#1E40AF" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="300" y1="150" x2="318" y2="132" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="300" cy="150" r="3" fill="#1E40AF"/>
</svg>
