<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Clipboard -->
  <rect x="160" y="50" width="80" height="120" fill="#1E40AF" fill-opacity="0.08" stroke="#1E40AF" stroke-width="2.5" rx="4"/>
  <rect x="180" y="40" width="40" height="15" fill="#1E40AF" fill-opacity="0.2" stroke="#1E40AF" stroke-width="1.5" rx="3"/>
  <!-- Checkmark lines on clipboard -->
  <line x1="175" y1="75" x2="225" y2="75" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="175" y1="90" x2="225" y2="90" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="175" y1="105" x2="225" y2="105" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="175" y1="120" x2="225" y2="120" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Checkmark -->
  <circle cx="200" cy="195" r="30" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2.5"/>
  <polyline points="185,195 195,208 215,182" fill="none" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small house icon -->
  <polygon points="200,235 175,255 225,255" fill="none" stroke="#1E40AF" stroke-width="2"/>
  <rect x="185" y="255" width="30" height="22" fill="none" stroke="#1E40AF" stroke-width="1.5"/>
  <rect x="195" y="265" width="10" height="12" fill="#1E40AF" fill-opacity="0.15" rx="1"/>
</svg>
