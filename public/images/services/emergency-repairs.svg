<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FED7AA"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Warning triangle -->
  <polygon points="200,45 320,240 80,240" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <text x="200" y="215" text-anchor="middle" font-size="60" font-family="sans-serif" fill="#F59E0B" font-weight="bold">!</text>
  <!-- Lightning bolt in center -->
  <polygon points="200,110 188,145 196,145 187,175 213,135 205,135 214,110" fill="#1E40AF"/>
  <!-- Pulse circles -->
  <circle cx="200" cy="155" r="70" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="200" cy="155" r="90" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.15"/>
</svg>
