<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Road/ground -->
  <line x1="0" y1="230" x2="400" y2="230" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Car body -->
  <path d="M80,190 L100,190 L120,160 L280,160 L300,190 L340,190 L340,230 L80,230 Z" fill="#1E40AF" fill-opacity="0.1" stroke="#1E40AF" stroke-width="2.5"/>
  <!-- Windows -->
  <path d="M130,160 L160,130 L240,130 L270,160 Z" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="200" y1="130" x2="200" y2="160" stroke="#1E40AF" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="130" cy="230" r="18" fill="none" stroke="#1E40AF" stroke-width="2.5"/>
  <circle cx="130" cy="230" r="6" fill="#1E40AF" fill-opacity="0.4"/>
  <circle cx="290" cy="230" r="18" fill="none" stroke="#1E40AF" stroke-width="2.5"/>
  <circle cx="290" cy="230" r="6" fill="#1E40AF" fill-opacity="0.4"/>
  <!-- Charging cable -->
  <path d="M310,190 Q350,160 360,120 Q365,100 355,90" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <!-- Charging station -->
  <rect x="345" y="75" width="20" height="55" fill="#1E40AF" fill-opacity="0.15" stroke="#1E40AF" stroke-width="1.5" rx="3"/>
  <rect x="340" y="65" width="30" height="15" fill="#1E40AF" fill-opacity="0.2" stroke="#1E40AF" stroke-width="1.5" rx="3"/>
  <text x="355" y="76" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#1E40AF" font-weight="bold">EV</text>
  <!-- Lightning bolt on charger -->
  <polygon points="355,95 351,105 353,105 349,112 357,103 355,103 359,95" fill="#F59E0B"/>
</svg>
